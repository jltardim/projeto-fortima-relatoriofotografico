version: "3.8"

services:
  # Banco de dados da nossa aplicacao (separado do Chatwoot)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: relatorio_fotos
      POSTGRES_USER: relatorio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-relatorio_secret_123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relatorio -d relatorio_fotos"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Nossa aplicacao
  app:
    build: .
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Banco local da aplicacao
      DATABASE_URL: postgresql://relatorio:${DB_PASSWORD:-relatorio_secret_123}@db:5432/relatorio_fotos

      # NextAuth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # Chatwoot API (preencher com seus dados)
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-1}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID:-1}

      # Chatwoot PostgreSQL (read-only) - conecta no banco do Chatwoot
      CHATWOOT_DB_HOST: ${CHATWOOT_DB_HOST}
      CHATWOOT_DB_PORT: ${CHATWOOT_DB_PORT:-5432}
      CHATWOOT_DB_NAME: ${CHATWOOT_DB_NAME:-chatwoot_production}
      CHATWOOT_DB_USER: ${CHATWOOT_DB_USER}
      CHATWOOT_DB_PASSWORD: ${CHATWOOT_DB_PASSWORD}

      # Claude API
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Google Drive
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY}
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_ROOT_FOLDER_ID}

      # Jobs
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-2}

volumes:
  pgdata:

networks:
  default:
    external:
      name: networking_public
