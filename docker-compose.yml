services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: relatorio_fotos
      POSTGRES_USER: relatorio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-relatorio_secret_123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relatorio -d relatorio_fotos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://relatorio:${DB_PASSWORD:-relatorio_secret_123}@db:5432/relatorio_fotos
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-2}

volumes:
  pgdata:

networks:
  default:
    name: networking_public
    external: true
