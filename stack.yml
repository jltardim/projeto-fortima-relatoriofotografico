version: "3.8"

services:
  relatorio-fotos:
    image: relatorio-fotos:latest
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:favuka123STACKS@postgres:5432/relatorio_fotos"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "https://relatorio.fortimaservidor.org"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      POLL_INTERVAL_MINUTES: "2"
      NODE_ENV: "production"
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  network_public:
    external: true
