version: "3.8"

services:
  relatorio-fotos:
    image: relatorio-fotos:latest
    environment:
      DATABASE_URL: "postgresql://postgres:favuka123STACKS@postgres:5432/relatorio_fotos"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "https://relatorio01.fortimaservidor.org"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      POLL_INTERVAL_MINUTES: "2"
      NODE_ENV: "production"
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.relatorio.rule=Host(`relatorio01.fortimaservidor.org`)"
        - "traefik.http.routers.relatorio.entrypoints=websecure"
        - "traefik.http.routers.relatorio.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.relatorio.loadbalancer.server.port=3000"

networks:
  network_public:
    external: true
